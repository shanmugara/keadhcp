<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kea DHCP{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      min-height: 100vh;
      background: #1a1d23;
      flex-shrink: 0;
    }
    #sidebar .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid #2e3340;
    }
    #sidebar .nav-link {
      color: #adb5bd;
      padding: .65rem 1rem;
      border-radius: 0.375rem;
      margin: 2px 8px;
    }
    #sidebar .nav-link:hover { background: #2e3340; color: #fff; }
    #sidebar .nav-link.active { background: #0d6efd; color: #fff; }
    #sidebar .nav-link i { margin-right: 8px; }

    /* ── Main content ── */
    #main { flex: 1; overflow-x: hidden; }
    .page-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: .85rem 1.5rem;
    }

    /* ── Tables ── */
    .table-wrapper { overflow-x: auto; }
    th a { color: inherit; text-decoration: none; white-space: nowrap; }
    th a:hover { text-decoration: underline; }
    .badge-expired { background-color: #dc3545; }
    .badge-active  { background-color: #198754; }
    tr.expired-row td { color: #aaa; }
    .sort-icon { font-size: .75rem; margin-left: 2px; }
    .stat-card { border-radius: .5rem; }

    /* ── Log viewer ── */
    #log-output {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: .8rem;
      white-space: pre-wrap;
      word-break: break-all;
      height: 72vh;
      overflow-y: auto;
      padding: 1rem;
      border-radius: .375rem;
    }
    .log-error  { color: #ff7b72; }
    .log-warn   { color: #e3b341; }
    .log-info   { color: #7ee787; }
    .log-debug  { color: #6e9ef1; }
    .log-line:hover { background: rgba(255,255,255,.05); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="d-flex">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="brand">
      <i class="bi bi-hdd-network me-2"></i>Kea DHCP
    </div>
    <ul class="nav flex-column mt-2">
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">
          <i class="bi bi-house"></i> Home
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'leases' %}active{% endif %}" href="/leases">
          <i class="bi bi-table"></i> Leases
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'reservations' %}active{% endif %}" href="/reservations">
          <i class="bi bi-bookmark-star"></i> Reservations
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'logs' %}active{% endif %}" href="/logs">
          <i class="bi bi-journal-text"></i> Logs
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main -->
  <div id="main">
    <div class="page-header d-flex align-items-center justify-content-between">
      <h5 class="mb-0">{% block page_title %}{% endblock %}</h5>
      <span class="text-muted small">{% block page_subtitle %}{% endblock %}</span>
    </div>

    <div class="p-3">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
